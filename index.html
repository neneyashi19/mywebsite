<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ARQUIVO VHS</title>

<style>
body {
    background: black;
    color: #00ff88;
    font-family: monospace;
    text-align: center;
    padding: 50px;
}

/* Tela VHS */
#tela {
    border: 3px solid #00ff88;
    padding: 20px;
    max-width: 800px;
    margin: auto;
}

/* Escondido */
.oculto {
    color: black; /* invisível */
}

/* glitch */
.glitch {
    animation: glitch 0.1s infinite;
}
@keyframes glitch {
    0% { transform: translate(2px); }
    50% { transform: translate(-2px); }
}
</style>

</head>

<body>

<div id="tela">

<h1>📼 ARQUIVO 1997</h1>

<p id="texto">
Carregando fita...
</p>

<button onclick="proximo()">▶ CONTINUAR</button>

</div>

<!-- PISTA OCULTA -->
<p class="oculto">
coordenadas: 23.5505 -46.6333
</p>

<script>

let etapa = 0;

const cenas = [
"Erro de leitura...",
"Recuperando dados...",
"🌱 Plantação detectada.",
"🚜 Equipamento ativo sem operador.",
"📻 Áudio presente...",
"VOCÊ NÃO DEVERIA ESTAR AQUI",
"...",
"ELE ESTÁ OBSERVANDO",
"VERIFIQUE O CÓDIGO FONTE"
];

function proximo() {
    etapa++;
    let texto = document.getElementById("texto");

    if (etapa < cenas.length) {
        texto.innerText = cenas[etapa];
    }

    /* glitch aleatório */
    if (Math.random() < 0.3) {
        document.body.classList.add("glitch");
        setTimeout(() => {
            document.body.classList.remove("glitch");
        }, 200);
    }

    /* evento escondido */
    if (etapa === 7) {
        alert("⚠ SINAL EXTERNO DETECTADO");
    }
}

</script>

</body>
</html>
